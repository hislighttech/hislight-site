<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIS LIGHT Technology | Blog Post</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.8; color: #1a1a2e; background: #ffffff; }
        :root { --primary: #6b21a5; --primary-dark: #581c87; --primary-light: #a855f7; }
        nav { background: white; box-shadow: 0 2px 20px rgba(0,0,0,0.05); padding: 1rem 2rem; position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .logo-text { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .back-link a { color: var(--primary); text-decoration: none; font-weight: 500; }
        .back-link a:hover { text-decoration: underline; }
        .post-container { max-width: 800px; margin: 3rem auto; padding: 0 2rem; }
        .post-category { display: inline-block; background: #f3e8ff; color: var(--primary); padding: 0.25rem 1rem; border-radius: 50px; font-size: 0.85rem; margin-bottom: 1rem; }
        .post-title { font-size: 2.5rem; margin-bottom: 1rem; color: var(--primary); }
        .post-date { color: #666; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #eee; }
        .post-content { font-size: 1.1rem; line-height: 1.8; }
        .post-content p { margin-bottom: 1.5rem; }
        .post-content h2 { margin: 2rem 0 1rem; color: var(--primary); }
        .social-share { margin: 2rem 0; padding: 1.5rem 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        .share-buttons { display: flex; gap: 1rem; flex-wrap: wrap; }
        .share-btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1.2rem; border-radius: 50px; text-decoration: none; color: white; font-weight: 500; transition: transform 0.2s; }
        .share-btn:hover { transform: translateY(-2px); }
        .share-facebook { background: #1877f2; }
        .share-twitter { background: #1da1f2; }
        .share-linkedin { background: #0077b5; }
        .cta-box { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); color: white; padding: 2rem; border-radius: 20px; text-align: center; margin: 2rem 0; }
        .cta-box a { display: inline-block; background: white; color: var(--primary); padding: 0.75rem 2rem; border-radius: 50px; text-decoration: none; font-weight: 600; margin-top: 1rem; }
        footer { background: #1a1a2e; color: white; text-align: center; padding: 2rem; margin-top: 3rem; }
        .spinner { display: inline-block; width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #6b21a5; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 768px) { .post-title { font-size: 1.8rem; } }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo">
                <img src="logo.jpg" alt="HIS LIGHT Technology" style="height: 45px;">
                <span class="logo-text">HIS LIGHT Technology</span></div>
            <div class="back-link"><a href="index.html#blog">← Back to Blog</a></div>
        </div>
    </nav>

    <div class="post-container" id="postContainer">
        <div id="postContent" style="text-align: center; padding: 50px;">
            <div class="spinner"></div>
            <p style="margin-top: 1rem;">Loading article...</p>
        </div>
    </div>

    <footer>
        <p>✨ HIS LIGHT Technology — Illuminating Digital Excellence</p>
        <p>© 2026 HIS LIGHT Technology. All rights reserved.</p>
    </footer>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzQfCvMGCwrq4LKZu7TOd2WSRQ7ZX5Z83VSqWnabtijvTV961xKhZ-U0rbu-p0O7GLOJg/exec";
        const CACHE_KEY = 'blog_posts_cache';
        const CACHE_TIME_KEY = 'blog_posts_cache_time';
        const ONE_HOUR = 60 * 60 * 1000;

        async function loadPost() {
            const urlParams = new URLSearchParams(window.location.search);
            const postId = urlParams.get('id');
            
            if (!postId) {
                document.getElementById('postContent').innerHTML = `<h1>No Post Specified</h1><p><a href="index.html#blog">← Back to Blog</a></p>`;
                return;
            }
            
            // Try to load from cache first (instant)
            const cachedPosts = localStorage.getItem(CACHE_KEY);
            const cacheTime = localStorage.getItem(CACHE_TIME_KEY);
            const cacheAge = cacheTime ? Date.now() - parseInt(cacheTime) : ONE_HOUR + 1;
            
            let post = null;
            
            // Check cache first
            if (cachedPosts && cacheAge < ONE_HOUR) {
                const allPosts = JSON.parse(cachedPosts);
                post = allPosts.find(p => parseInt(p.id) === parseInt(postId) && p.status === 'published');
                if (post) {
                    console.log("Loaded from cache (instant)");
                    displayPost(post);
                }
            }
            
            // Always fetch fresh data in background
            try {
                console.log("Fetching fresh data...");
                const response = await fetch(API_URL);
                const allPosts = await response.json();
                
                // Update cache
                localStorage.setItem(CACHE_KEY, JSON.stringify(allPosts));
                localStorage.setItem(CACHE_TIME_KEY, Date.now().toString());
                
                const freshPost = allPosts.find(p => parseInt(p.id) === parseInt(postId) && p.status === 'published');
                
                if (freshPost) {
                    // If we already displayed from cache, check if content changed
                    if (post && JSON.stringify(post) !== JSON.stringify(freshPost)) {
                        console.log("Content updated, refreshing...");
                        displayPost(freshPost);
                    } else if (!post) {
                        displayPost(freshPost);
                    }
                } else if (!post) {
                    document.getElementById('postContent').innerHTML = `<h1>Post Not Found</h1><p>The post you're looking for doesn't exist or isn't published yet.</p><p><strong>Post ID requested:</strong> ${postId}</p><a href="index.html#blog">← Back to Blog</a>`;
                }
            } catch (error) {
                console.error('Error:', error);
                if (!post) {
                    document.getElementById('postContent').innerHTML = `<h1>Error Loading Post</h1><p>Please try again later.</p><a href="index.html#blog">← Back to Blog</a>`;
                }
            }
        }
        
        function displayPost(post) {
            document.title = `${post.title} | HIS LIGHT Technology`;
            
            let imageHtml = '';
            if (post.image && post.image !== 'null' && post.image !== '' && post.image !== 'undefined') {
                imageHtml = `<div style="text-align: center; margin-bottom: 2rem;">
                                <img src="${post.image}" alt="${escapeHtml(post.title)}" style="max-width: 100%; max-height: 400px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);">
                            </div>`;
            }
            
            const shareUrl = encodeURIComponent(window.location.href);
            const shareTitle = encodeURIComponent(post.title);
            
            document.getElementById('postContent').innerHTML = `
                <span class="post-category">${post.category}</span>
                <h1 class="post-title">${escapeHtml(post.title)}</h1>
                <div class="post-date">📅 ${post.date}</div>
                ${imageHtml}
                <div class="post-content">${post.content}</div>
                <div class="social-share">
                    <h4>📢 Share this article:</h4>
                    <div class="share-buttons">
                        <a href="https://www.facebook.com/sharer/sharer.php?u=${shareUrl}" target="_blank" class="share-btn share-facebook">📘 Facebook</a>
                        <a href="https://twitter.com/intent/tweet?text=${shareTitle}&url=${shareUrl}" target="_blank" class="share-btn share-twitter">🐦 Twitter</a>
                        <a href="https://www.linkedin.com/sharing/share-offsite/?url=${shareUrl}" target="_blank" class="share-btn share-linkedin">🔗 LinkedIn</a>
                        <a href="https://wa.me/?text=Check%20out%20this%20article%20from%20HIS%20LIGHT%20Technology%3A%20${shareTitle}%20-%20${shareUrl}" target="_blank" class="share-btn" style="background:#25D366;">💬 WhatsApp</a>
                    </div>
                </div>
                <div class="cta-box">
                    <h3>Ready to Transform Your Business?</h3>
                    <p>Let's discuss how HIS LIGHT Technology can help you achieve your goals.</p>
                    <a href="index.html#consultation">Book a Free Consultation →</a>
                </div>
            `;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        loadPost();
    </script>
</body>
</html>
