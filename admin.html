<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - HIS LIGHT Technology</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f5f5; padding: 2rem; }
        .container { max-width: 1200px; margin: 0 auto; }
        .login-box, .admin-box { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .admin-box { max-width: 1200px; }
        h1, h2 { color: #6b21a5; margin-bottom: 1rem; }
        input, select, textarea { width: 100%; padding: 0.75rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; }
        button { background: #6b21a5; color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .post-item { background: #f9f9f9; padding: 1rem; margin-bottom: 1rem; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .delete-btn { background: #dc2626; }
        .edit-btn { background: #f59e0b; }
        .success { background: #d1fae5; color: #065f46; padding: 1rem; border-radius: 10px; margin-bottom: 1rem; }
        .error { background: #fee2e2; color: #991b1b; padding: 1rem; border-radius: 10px; margin-bottom: 1rem; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        .status-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 50px; font-size: 0.75rem; margin-left: 0.5rem; }
        .status-published { background: #d1fae5; color: #065f46; }
        .status-draft { background: #fef3c7; color: #92400e; }
        .row-2cols { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .image-preview { margin-top: 0.5rem; max-width: 150px; }
        .image-preview img { width: 100%; border-radius: 8px; border: 1px solid #ddd; }
        .image-upload-area { border: 2px dashed #ddd; padding: 1rem; border-radius: 10px; text-align: center; cursor: pointer; margin-bottom: 1rem; }
        @media (max-width: 768px) { .row-2cols { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container" id="app"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby1niIziaVxD3bVgXEfPHx2DpTBcS-7W5nU2Dje8t0MOp5iSiRd8mVKv15xYO2KOV36Yg/exec";
        const PASSWORD = "admin123";
        
        let isLoggedIn = false;
        let blogPosts = [];
        let editingPost = null;
        let currentImageData = null;

        async function loadPosts() {
            try {
                const response = await fetch(API_URL);
                blogPosts = await response.json();
                return blogPosts;
            } catch (error) {
                console.error('Error loading posts:', error);
                return [];
            }
        }

        async function savePost(post) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'save', post: post })
                });
                return true;
            } catch (error) {
                console.error('Error saving post:', error);
                return false;
            }
        }

        async function deletePost(id) {
            try {
                await fetch(`${API_URL}?action=delete&id=${id}`, { method: 'GET', mode: 'no-cors' });
                return true;
            } catch (error) {
                console.error('Error deleting post:', error);
                return false;
            }
        }

        function showMessage(msg, type) {
            const msgDiv = document.getElementById('message');
            if (msgDiv) {
                msgDiv.innerHTML = `<div class="${type}">${msg}</div>`;
                setTimeout(() => msgDiv.innerHTML = '', 3000);
            }
        }

        async function handleDelete(id) {
            if (confirm('Delete this post?')) {
                await deletePost(id);
                showMessage('Post deleted!', 'success');
                await renderAdminPanel();
            }
        }

        function handleEdit(post) {
            editingPost = post;
            currentImageData = post.image || null;
            renderPostForm();
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentImageData = e.target.result;
                    const previewDiv = document.getElementById('imagePreview');
                    if (previewDiv) {
                        previewDiv.innerHTML = `<div class="image-preview"><img src="${currentImageData}" alt="Preview"><button type="button" onclick="removeImage()">Remove</button></div>`;
                    }
                };
                reader.readAsDataURL(file);
            }
        }

        function removeImage() {
            currentImageData = null;
            const previewDiv = document.getElementById('imagePreview');
            if (previewDiv) previewDiv.innerHTML = '';
            const fileInput = document.getElementById('imageInput');
            if (fileInput) fileInput.value = '';
        }

        function renderLogin() {
            document.getElementById('app').innerHTML = `
                <div class="login-box" style="max-width: 500px; margin: 0 auto;">
                    <h2>🔐 Admin Login</h2>
                    <div id="message"></div>
                    <input type="password" id="password" placeholder="Enter password">
                    <button onclick="login()">Login</button>
                    <p style="margin-top: 1rem;">Password: <strong>admin123</strong></p>
                </div>
            `;
        }

        async function login() {
            const password = document.getElementById('password').value;
            if (password === PASSWORD) {
                isLoggedIn = true;
                await renderAdminPanel();
            } else {
                showMessage('Wrong password!', 'error');
            }
        }

        function logout() {
            isLoggedIn = false;
            renderLogin();
        }

        function renderPostForm() {
            const post = editingPost || { title: '', date: new Date().toISOString().split('T')[0], category: 'AI', excerpt: '', content: '', status: 'draft', image: null };
            
            document.getElementById('app').innerHTML = `
                <div class="admin-box">
                    <div class="header">
                        <h2>${editingPost ? '✏️ Edit Post' : '📝 Create New Post'}</h2>
                        <button onclick="renderAdminPanel()">← Back</button>
                    </div>
                    <div id="message"></div>
                    <div class="form-group"><label>Title</label><input type="text" id="title" value="${escapeHtml(post.title)}"></div>
                    <div class="row-2cols">
                        <div class="form-group"><label>Date</label><input type="date" id="date" value="${post.date}"></div>
                        <div class="form-group"><label>Category</label>
                            <select id="category">
                                <option value="AI" ${post.category === 'AI' ? 'selected' : ''}>AI</option>
                                <option value="SaaS" ${post.category === 'SaaS' ? 'selected' : ''}>SaaS</option>
                                <option value="Mobile" ${post.category === 'Mobile' ? 'selected' : ''}>Mobile</option>
                                <option value="Marketing" ${post.category === 'Marketing' ? 'selected' : ''}>Marketing</option>
                                <option value="Career" ${post.category === 'Career' ? 'selected' : ''}>Career</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Featured Image</label>
                        <div class="image-upload-area" onclick="document.getElementById('imageInput').click()">📸 Click to upload image</div>
                        <input type="file" id="imageInput" accept="image/*" style="display:none;" onchange="handleImageUpload(event)">
                        <div id="imagePreview">${currentImageData ? `<div class="image-preview"><img src="${currentImageData}" alt="Preview"><button onclick="removeImage()">Remove</button></div>` : ''}</div>
                    </div>
                    <div class="form-group"><label>Excerpt</label><textarea id="excerpt" rows="3">${escapeHtml(post.excerpt)}</textarea></div>
                    <div class="form-group"><label>Content (HTML allowed)</label><textarea id="content" rows="10">${escapeHtml(post.content)}</textarea></div>
                    <div class="row-2cols">
                        <button onclick="savePostData('draft')">💾 Save as Draft</button>
                        <button onclick="savePostData('published')">🚀 Publish Now</button>
                    </div>
                </div>
            `;
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        async function savePostData(status) {
            const title = document.getElementById('title').value;
            const date = document.getElementById('date').value;
            const category = document.getElementById('category').value;
            const excerpt = document.getElementById('excerpt').value;
            const content = document.getElementById('content').value;
            
            if (!title || !date || !excerpt || !content) {
                showMessage('Please fill all fields', 'error');
                return;
            }
            
            let posts = await loadPosts();
            let newId = editingPost ? editingPost.id : (posts.length > 0 ? Math.max(...posts.map(p => p.id)) + 1 : 1);
            
            const newPost = {
                id: newId,
                title, date, category, excerpt, content,
                image: currentImageData || '',
                status: status
            };
            
            showMessage('Saving...', 'success');
            const success = await savePost(newPost);
            if (success) {
                showMessage(status === 'published' ? '✅ Published!' : '✅ Draft saved!', 'success');
                editingPost = null;
                currentImageData = null;
                await renderAdminPanel();
            } else {
                showMessage('❌ Error saving. Check your API URL.', 'error');
            }
        }

        async function renderAdminPanel() {
            await loadPosts();
            
            const publishedCount = blogPosts.filter(p => p.status === 'published').length;
            const draftCount = blogPosts.filter(p => p.status === 'draft').length;
            
            document.getElementById('app').innerHTML = `
                <div class="admin-box">
                    <div class="header">
                        <h1>📝 Blog Admin</h1>
                        <div>
                            <button onclick="editingPost=null; currentImageData=null; renderPostForm()">+ New Post</button>
                            <button onclick="logout()" style="background:#6b7280;">Logout</button>
                        </div>
                    </div>
                    <div id="message"></div>
                    <div style="margin-bottom: 1rem;">
                        <span>📋 Total: ${blogPosts.length} | </span>
                        <span style="color:#10b981;">✅ Published: ${publishedCount}</span>
                        <span style="margin-left: 1rem; color:#f59e0b;">📝 Drafts: ${draftCount}</span>
                    </div>
                    ${blogPosts.length === 0 ? '<p>No posts yet. Click "New Post" to create one.</p>' : ''}
                    ${blogPosts.sort((a,b) => b.id - a.id).map(post => `
                        <div class="post-item">
                            <div>
                                <strong>${escapeHtml(post.title)}</strong>
                                <span class="status-badge ${post.status === 'published' ? 'status-published' : 'status-draft'}">${post.status === 'published' ? '✅ Published' : '📝 Draft'}</span>
                                ${post.image ? ' 🖼️' : ''}
                                <br><small>📅 ${post.date} | 🏷️ ${post.category}</small>
                            </div>
                            <div>
                                <button class="edit-btn" onclick='handleEdit(${JSON.stringify(post).replace(/</g, '\\u003c')})'>✏️ Edit</button>
                                <button class="delete-btn" onclick="handleDelete(${post.id})">🗑️ Delete</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        renderLogin();
    </script>
</body>
</html>
